<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Nhập Admin - WebTruyện</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-icon">🐧</span>
      <div>
        <div class="login-logo-name">WebTruyện</div>
        <div class="login-logo-sub">Trang Quản Trị</div>
      </div>
    </div>

    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" placeholder="admin" autofocus>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="••••••••">
          <button type="button" class="pass-toggle" id="passToggle">👁</button>
        </div>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn-login" id="btnLogin">Đăng Nhập</button>
    </form>

    <div class="login-hint">
      Mặc định: <code>admin</code> / <code>admin123</code>
    </div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
